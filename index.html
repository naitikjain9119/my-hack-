<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Secure File Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41;
            --primary-dark: #00cc33;
            --secondary: #0a0a0a;
            --danger: #ff0033;
            --warning: #ffcc00;
            --success: #00ff41;
            --code-bg: #050f05;
            --code-text: #00ff41;
            --neon-green: #00ff41;
            --neon-blue: #00d4ff;
            --neon-red: #ff0033;
            --neon-yellow: #ffcc00;
            --matrix-dark: #001a00;
            --panel-bg: rgba(0, 15, 0, 0.92);
            --border-glow: 0 0 8px #00ff41, 0 0 20px rgba(0,255,65,0.3);
            --text-glow: 0 0 8px #00ff41;
        }

        @keyframes matrixRain {
            0% { transform: translateY(-100%); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        @keyframes scanline {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        @keyframes glitch {
            0%,100% { clip-path: inset(0 0 98% 0); transform: translate(-3px,0); }
            20% { clip-path: inset(50% 0 30% 0); transform: translate(3px,0); }
            40% { clip-path: inset(20% 0 60% 0); transform: translate(-2px,0); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(2px,0); }
            80% { clip-path: inset(10% 0 85% 0); transform: translate(-1px,0); }
        }
        @keyframes pulseGlow {
            0%,100% { box-shadow: 0 0 5px var(--neon-green), 0 0 15px rgba(0,255,65,0.3); }
            50% { box-shadow: 0 0 15px var(--neon-green), 0 0 40px rgba(0,255,65,0.5), 0 0 60px rgba(0,255,65,0.2); }
        }
        @keyframes textBlink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        @keyframes borderSpin {
            0% { border-color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
            33% { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
            66% { border-color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
            100% { border-color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.85) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes terminalCursor {
            0%,100% { opacity: 1; }
            50% { opacity: 0; }
        }
        @keyframes bootText {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes neonFlicker {
            0%,19%,21%,23%,25%,54%,56%,100% { 
                text-shadow: 0 0 7px #00ff41, 0 0 10px #00ff41, 0 0 21px #00ff41, 0 0 42px #00ff41;
            }
            20%,24%,55% { text-shadow: none; opacity: 0.7; }
        }
        @keyframes itemFadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes toastSlide {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes overlayOpen {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ===== MATRIX CANVAS BG ===== */
        #matrix-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
            opacity: 0.18;
        }
        .scanline-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,0,0,0.15) 3px,
                rgba(0,0,0,0.15) 4px
            );
        }
        .scanline-sweep {
            position: fixed; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to bottom, transparent, rgba(0,255,65,0.08), transparent);
            z-index: 0; pointer-events: none;
            animation: scanline 6s linear infinite;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Share Tech Mono', monospace; }
        
        body { 
            background-color: #000a00; 
            height: 100vh; 
            display: flex; flex-direction: column; 
            overflow: hidden;
            color: var(--neon-green);
        }

        .hidden { display: none !important; }

        /* ===== BUTTONS ===== */
        .btn { 
            padding: 8px 16px; 
            border: 1px solid var(--neon-green); 
            border-radius: 2px; 
            cursor: pointer; 
            color: var(--neon-green); 
            background: rgba(0,255,65,0.08);
            transition: all 0.2s; 
            font-size: 0.85rem;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,65,0.15), transparent);
            transition: left 0.3s;
        }
        .btn:hover::before { left: 100%; }
        .btn:hover { 
            background: rgba(0,255,65,0.18); 
            box-shadow: var(--border-glow);
            color: #fff;
        }
        .btn-primary { border-color: var(--neon-green); color: var(--neon-green); }
        .btn-secondary { border-color: #00aaff; color: #00aaff; background: rgba(0,170,255,0.06); }
        .btn-secondary:hover { background: rgba(0,170,255,0.15); box-shadow: 0 0 8px #00aaff, 0 0 20px rgba(0,170,255,0.3); }
        .btn-danger { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255,0,51,0.06); }
        .btn-danger:hover { background: rgba(255,0,51,0.15); box-shadow: 0 0 8px var(--neon-red); }
        .btn-warning { border-color: var(--neon-yellow); color: var(--neon-yellow); background: rgba(255,204,0,0.06); }
        .btn-warning:hover { background: rgba(255,204,0,0.15); box-shadow: 0 0 8px var(--neon-yellow); }
        .btn-success { border-color: var(--neon-green); color: #000; background: var(--neon-green); font-weight: bold; }
        .btn-success:hover { background: #00cc33; box-shadow: var(--border-glow); }
        .btn:disabled { border-color: #333; color: #444; cursor: not-allowed; background: transparent; box-shadow: none; }
        .btn:disabled::before { display: none; }

        /* ===== INPUTS ===== */
        .search-box {
            padding: 8px 12px;
            border: 1px solid #00ff4166;
            border-radius: 2px;
            width: 200px;
            background: rgba(0,20,0,0.8);
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
        }
        .search-box:focus {
            border-color: var(--neon-green);
            box-shadow: var(--border-glow);
            background: rgba(0,30,0,0.9);
        }
        .search-box::placeholder { color: #00ff4155; }

        /* ===== SEARCH MODE BUTTONS ===== */
        .search-mode-group {
            display: flex; gap: 0;
            border-radius: 2px; overflow: hidden;
            border: 1px solid #00ff4155;
            flex-shrink: 0;
        }
        .search-mode-btn {
            padding: 7px 11px; font-size: 0.72rem; font-weight: 600;
            border: none; cursor: pointer;
            background: rgba(0,20,0,0.8); color: #00ff4188;
            transition: all 0.18s; white-space: nowrap;
            border-right: 1px solid #00ff4133;
            font-family: 'Share Tech Mono', monospace;
            line-height: 1.3; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .search-mode-btn:last-child { border-right: none; }
        .search-mode-btn:hover { background: rgba(0,255,65,0.12); color: var(--neon-green); }
        .search-mode-btn.active-mode {
            background: rgba(0,255,65,0.2);
            color: var(--neon-green);
            text-shadow: var(--text-glow);
        }

        /* ===== SCREENS ===== */
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* ===== ROLE SCREEN ===== */
        #role-screen { 
            align-items: center; justify-content: center; 
            background: radial-gradient(ellipse at 50% 40%, #001a00 0%, #000500 60%, #000000 100%);
        }
        #role-screen h1 { 
            font-family: 'Orbitron', monospace;
            color: var(--neon-green);
            margin-bottom: 50px;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            animation: neonFlicker 4s infinite 2s;
            text-shadow: 0 0 7px #00ff41, 0 0 21px #00ff41, 0 0 42px #00ff41;
        }
        #role-screen h1::before {
            content: '> ';
            animation: terminalCursor 1s infinite;
        }
        .card { 
            background: rgba(0,15,0,0.9);
            padding: 35px 30px; 
            border-radius: 4px; 
            text-align: center; cursor: pointer; 
            width: 200px;
            border: 1px solid #00ff4155;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin: 0 20px;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.6s ease-out both;
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.25s; }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            animation: textBlink 2s infinite;
        }
        .card::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(0,255,65,0.04) 0%, transparent 100%);
            pointer-events: none;
        }
        .card:hover { 
            transform: translateY(-8px) scale(1.03); 
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0,255,65,0.4), 0 0 60px rgba(0,255,65,0.15), inset 0 0 30px rgba(0,255,65,0.05);
        }
        .card h2 { 
            font-family: 'Orbitron', monospace;
            color: var(--neon-green);
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }
        .card p { color: #00ff4188; font-size: 0.8rem; letter-spacing: 1px; }
        .icon-large { 
            font-size: 3rem; 
            display: block; 
            margin-bottom: 12px;
            filter: drop-shadow(0 0 8px rgba(0,255,65,0.6));
            transition: transform 0.3s;
        }
        .card:hover .icon-large { transform: scale(1.15); }

        /* ===== LOGIN SCREEN ===== */
        #login-screen { 
            align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 50% 40%, #001a00 0%, #000500 60%, #000000 100%);
        }
        .login-box { 
            background: rgba(0,12,0,0.95);
            padding: 35px;
            border-radius: 4px;
            width: 360px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 30px rgba(0,255,65,0.2), 0 0 80px rgba(0,255,65,0.05);
            animation: overlayOpen 0.4s ease-out;
            position: relative;
        }
        .login-box::before {
            content: '[ AUTHENTICATION REQUIRED ]';
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: #000a00; color: var(--neon-green);
            font-size: 0.7rem; letter-spacing: 2px; padding: 0 10px;
            white-space: nowrap;
        }
        .login-box h2 { 
            font-family: 'Orbitron', monospace;
            color: var(--neon-green);
            text-align: center; margin-bottom: 20px;
            font-size: 1.1rem; letter-spacing: 4px;
            text-shadow: var(--text-glow);
        }
        .form-input { 
            width: 100%; padding: 10px 14px;
            margin: 8px 0;
            border: 1px solid #00ff4155;
            border-radius: 2px;
            background: rgba(0,20,0,0.7);
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus { 
            border-color: var(--neon-green);
            box-shadow: var(--border-glow);
            background: rgba(0,30,0,0.9);
        }
        .form-input::placeholder { color: #00ff4144; }

        /* ===== HEADER ===== */
        header { 
            background: rgba(0,8,0,0.97);
            color: var(--neon-green);
            padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #00ff4133;
            box-shadow: 0 2px 20px rgba(0,255,65,0.1);
            position: relative;
        }
        header::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            animation: textBlink 3s infinite;
        }
        header > div { 
            font-family: 'Orbitron', monospace;
            font-size: 1rem; letter-spacing: 2px;
            text-shadow: var(--text-glow);
        }
        
        /* ===== TOOLBAR ===== */
        .toolbar { 
            padding: 10px 20px;
            background: rgba(0,10,0,0.95);
            border-bottom: 1px solid #00ff4122;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .toolbar input[type="text"] {
            padding: 6px 10px;
            border: 1px solid #00ff4155;
            border-radius: 2px;
            background: rgba(0,20,0,0.8);
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem; outline: none;
            transition: all 0.2s;
        }
        .toolbar input[type="text"]:focus {
            border-color: var(--neon-green);
            box-shadow: var(--border-glow);
        }
        .toolbar input[type="text"]::placeholder { color: #00ff4144; }

        /* ===== BREADCRUMB ===== */
        .breadcrumb-nav { 
            font-weight: bold; font-size: 0.85rem;
            flex: 1; display: flex; align-items: center; flex-wrap: wrap; gap: 2px;
            font-family: 'Share Tech Mono', monospace;
        }
        .breadcrumb-nav .bc-part { 
            cursor: pointer; 
            color: var(--neon-green);
            text-decoration: none;
            padding: 2px 6px; border-radius: 2px;
            white-space: nowrap;
            border: 1px solid transparent;
            transition: all 0.15s;
        }
        .breadcrumb-nav .bc-part:hover { 
            background: rgba(0,255,65,0.1);
            border-color: #00ff4144;
            text-shadow: var(--text-glow);
        }
        .breadcrumb-nav .bc-part.bc-current { 
            color: #fff;
            text-shadow: 0 0 6px #00ff41;
            cursor: default;
        }
        .breadcrumb-nav .bc-part.bc-current:hover { background: transparent; border-color: transparent; }
        .breadcrumb-nav .bc-sep { color: #00ff4155; font-size: 0.8rem; user-select: none; }

        /* ===== FILE EXPLORER ===== */
        .file-explorer { 
            flex: 1; padding: 20px;
            overflow-y: auto;
            background: rgba(0,5,0,0.97);
        }
        .file-explorer::-webkit-scrollbar { width: 6px; }
        .file-explorer::-webkit-scrollbar-track { background: #000; }
        .file-explorer::-webkit-scrollbar-thumb { background: #00ff4155; border-radius: 3px; }
        .file-explorer::-webkit-scrollbar-thumb:hover { background: var(--neon-green); }

        .grid { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 16px;
        }

        .item { 
            background: rgba(0,15,0,0.85);
            padding: 15px 10px; border-radius: 3px;
            text-align: center; cursor: pointer;
            border: 1px solid #00ff4122;
            transition: all 0.2s;
            position: relative; overflow: hidden;
            animation: itemFadeIn 0.3s ease-out both;
            color: var(--neon-green);
            font-size: 0.78rem;
        }
        .item::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,255,65,0.4), transparent);
            opacity: 0; transition: opacity 0.2s;
        }
        .item:hover::before { opacity: 1; }
        .item:hover { 
            transform: translateY(-4px) scale(1.02);
            border-color: var(--neon-green);
            box-shadow: 0 0 12px rgba(0,255,65,0.25), 0 4px 15px rgba(0,0,0,0.5);
            background: rgba(0,30,0,0.9);
            color: #fff;
            text-shadow: 0 0 5px #00ff41;
        }
        .item.selected { 
            background: rgba(0,255,65,0.12);
            border-color: var(--neon-green);
            box-shadow: var(--border-glow);
            color: #fff;
        }
        .item-icon { 
            font-size: 2.5rem; display: block; margin-bottom: 6px;
            filter: drop-shadow(0 0 5px rgba(0,255,65,0.5));
            transition: transform 0.2s;
        }
        .item:hover .item-icon { transform: scale(1.15); }

        /* ===== NOTEPAD OVERLAY ===== */
        #notepad-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000a00;
            z-index: 100; display: none; flex-direction: column;
            animation: overlayOpen 0.3s ease-out;
        }
        #notepad-overlay.active { display: flex; }
        #notepad-header { 
            background: rgba(0,8,0,0.98);
            padding: 10px 20px; color: var(--neon-green);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #00ff4133;
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem; letter-spacing: 2px;
        }
        #note-filename { 
            text-shadow: var(--text-glow);
            position: relative;
        }
        #note-filename::before { content: '📄 '; }
        
        /* ===== FORMAT TOOLBAR ===== */
        #format-toolbar { 
            background: rgba(0,10,0,0.98);
            padding: 8px 12px;
            border-bottom: 1px solid #00ff4122;
            display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
        }
        
        .format-btn { 
            background: rgba(0,20,0,0.8);
            border: 1px solid #00ff4155;
            padding: 5px 12px;
            cursor: pointer; border-radius: 2px;
            font-weight: bold; min-width: 35px;
            color: var(--neon-green);
            transition: all 0.15s;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
        }
        .format-btn:hover { 
            background: rgba(0,255,65,0.15);
            border-color: var(--neon-green);
            box-shadow: 0 0 6px rgba(0,255,65,0.3);
        }
        .format-btn.active-tool { 
            background: rgba(0,255,65,0.25);
            color: #fff;
            border-color: var(--neon-green);
            box-shadow: var(--border-glow);
        }
        
        .format-btn-img { 
            background: rgba(138,43,226,0.2);
            border: 1px solid rgba(138,43,226,0.6);
            padding: 5px 12px; cursor: pointer;
            border-radius: 2px; font-weight: bold;
            color: #cc88ff; transition: all 0.15s;
            font-size: 0.8rem;
            font-family: 'Share Tech Mono', monospace;
        }
        .format-btn-img:hover { 
            background: rgba(138,43,226,0.35);
            box-shadow: 0 0 8px rgba(138,43,226,0.5);
        }

        .divider { border-left: 1px solid #00ff4133; height: 20px; margin: 0 4px; }

        /* ===== AUTO SAVE TOGGLE ===== */
        .autosave-wrapper { 
            display: flex; align-items: center; gap: 7px;
            font-size: 0.75rem; margin-right: 15px;
            color: var(--neon-green); letter-spacing: 1px;
        }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #001500; transition: .4s; border-radius: 34px;
            border: 1px solid #00ff4155;
        }
        .slider:before { 
            position: absolute; content: ""; height: 12px; width: 12px;
            left: 4px; bottom: 3px;
            background-color: #00ff4188; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: rgba(0,255,65,0.2); border-color: var(--neon-green); }
        input:checked + .slider:before { transform: translateX(14px); background: var(--neon-green); box-shadow: 0 0 6px var(--neon-green); }

        /* ===== EDITOR ===== */
        #note-editor { 
            flex: 1; padding: 30px;
            font-size: 1rem; border: none; outline: none;
            width: 100%; max-width: 1000px; margin: 0 auto;
            overflow-y: auto; line-height: 1.7;
            background: transparent;
            color: #ccffcc;
            font-family: 'Share Tech Mono', monospace;
            caret-color: var(--neon-green);
        }
        #note-editor::-webkit-scrollbar { width: 6px; }
        #note-editor::-webkit-scrollbar-track { background: #000; }
        #note-editor::-webkit-scrollbar-thumb { background: #00ff4155; border-radius: 3px; }
        #note-editor[contenteditable="false"] { color: #99cc99; }
        .highlight-found { background-color: rgba(255,255,0,0.3); color: #ffff00; border-radius: 2px; }

        /* ===== CODE BLOCK ===== */
        .code-container { 
            margin: 15px 0;
            background: #030f03;
            border-radius: 3px; overflow: hidden;
            border: 1px solid #00ff4144;
            box-shadow: 0 0 10px rgba(0,255,65,0.1);
        }
        .code-header { 
            background: #020a02; color: #00ff4199;
            padding: 5px 15px; font-size: 0.8rem;
            display: flex; justify-content: space-between; align-items: center;
            user-select: none;
            border-bottom: 1px solid #00ff4122;
            font-family: 'Share Tech Mono', monospace;
        }
        .code-copy-btn { 
            background: rgba(0,255,65,0.1); border: 1px solid #00ff4155;
            color: var(--neon-green); font-size: 0.7rem; padding: 2px 8px;
            border-radius: 2px; cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
        }
        .code-copy-btn:hover { background: rgba(0,255,65,0.25); box-shadow: 0 0 6px rgba(0,255,65,0.3); }
        .code-delete-btn { 
            background: rgba(255,0,51,0.15); border: 1px solid var(--neon-red);

    <!-- MATRIX RAIN SCRIPT -->
    <script>
        (function() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, cols, drops;
            const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF><{}[]|/\\';
            function init() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                cols = Math.floor(W / 18);
                drops = Array(cols).fill(1).map(() => Math.random() * -H);
            }
            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.fillRect(0, 0, W, H);
                ctx.font = '14px Share Tech Mono, monospace';
                for (let i = 0; i < cols; i++) {
                    const bright = Math.random() > 0.95;
                    ctx.fillStyle = bright ? '#ffffff' : (Math.random() > 0.7 ? '#00ff41' : '#004d14');
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(char, i * 18, drops[i]);
                    if (drops[i] > H && Math.random() > 0.975) drops[i] = 0;
                    drops[i] += 18;
                }
            }
            init();
            setInterval(draw, 45);
            window.addEventListener('resize', init);
        })();
    </script>

    <!-- SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAElPv2M7vQCFJDM2WcedqStUPWOQLM5qs",
            authDomain: "hacking-code-7cc15.firebaseapp.com",
            databaseURL: "https://hacking-code-7cc15-default-rtdb.firebaseio.com",
            projectId: "hacking-code-7cc15",
            storageBucket: "hacking-code-7cc15.firebasestorage.app",
            messagingSenderId: "977452112251",
            appId: "1:977452112251:web:cb5a436e5de0a605fbc5de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const filesRef = ref(db, 'files');
        const CREDENTIALS = { id: "naitikjain240725@gmail.com", pass: "jain6799" };

        // STATE
        let files = [];
        let state = {
            role: 'user', 
            currentFolderId: null,
            selectedId: null,
            openNoteId: null,
            targetMoveFolder: null
        };
        let autoSaveTimer = null;
        let isAutoSaveOn = false;

        // SYNC DB
        onValue(filesRef, (snapshot) => {
            const data = snapshot.val();
            files = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            renderFiles();
        });

        // ============================================================
        // BREADCRUMB - Home से current folder तक पूरी hierarchy
        // ============================================================
        function buildBreadcrumb(folderId) {
            const container = document.getElementById('breadcrumb-path');
            container.innerHTML = '';

            // Build path array from current folder back to root
            const path = [];
            let current = folderId;
            while (current) {
                const folder = files.find(f => f.id === current);
                if (!folder) break;
                path.unshift({ id: folder.id, name: folder.name });
                current = folder.parent || null;
            }

            // Home part (always clickable unless we're at home)
            const homeSpan = document.createElement('span');
            homeSpan.className = 'bc-part' + (path.length === 0 ? ' bc-current' : '');
            homeSpan.textContent = '🏠 Home';
            if (path.length > 0) homeSpan.onclick = () => goToFolder(null);
            container.appendChild(homeSpan);

            // Each folder in path
            path.forEach((part, idx) => {
                const sep = document.createElement('span');
                sep.className = 'bc-sep';
                sep.textContent = ' › ';
                container.appendChild(sep);

                const span = document.createElement('span');
                const isLast = idx === path.length - 1;
                span.className = 'bc-part' + (isLast ? ' bc-current' : '');
                span.textContent = '📁 ' + part.name;
                if (!isLast) {
                    const capturedId = part.id;
                    span.onclick = () => goToFolder(capturedId);
                }
                container.appendChild(span);
            });
        }

        // Navigate directly to any folder in breadcrumb
        window.goToFolder = function(folderId) {
            state.currentFolderId = folderId;
            document.getElementById('file-search').value = '';
            renderFiles();
        };

        // ============================================================
        // SESSION
        // ============================================================
        window.startSession = function(role) {
            state.role = role;
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('role-badge').textContent = role === 'host' ? 'Admin' : 'View Only';
            document.querySelectorAll('.admin-tools').forEach(el => role === 'host' ? el.classList.remove('hidden') : el.classList.add('hidden'));
            if(role === 'host') document.body.classList.add('is-host');
            else document.body.classList.remove('is-host');
            renderFiles();
        };

        window.showLogin = () => {
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        };
        
        window.logout = function() {
            state = { role: 'user', currentFolderId: null, selectedId: null, openNoteId: null };
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('role-screen').classList.remove('hidden');
            document.body.classList.remove('is-host');
            closeNote();
            isAutoSaveOn = false;
        };

        // ============================================================
        // FILE NAV
        // ============================================================
        window.goUp = function() {
            if(state.currentFolderId) {
                const cur = files.find(f => f.id === state.currentFolderId);
                state.currentFolderId = cur ? (cur.parent || null) : null;
                document.getElementById('file-search').value = '';
                renderFiles();
            }
        };

        // ============================================================
        // CRUD
        // ============================================================
        window.createItem = function(type) {
            const name = document.getElementById('new-name').value.trim() || (type==='folder'?'New Folder':'New Note');
            push(filesRef, {
                parent: state.currentFolderId || null,
                type: type,
                name: name,
                content: '' 
            });
            document.getElementById('new-name').value = '';
        };

        window.selectItem = function(id, el) {
            state.selectedId = id;
            document.querySelectorAll('.item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            updateButtons();
        };

        window.deleteItem = function() {
            if(!state.selectedId || !confirm("Delete Permanently?")) return;
            const updates = {};
            updates['files/' + state.selectedId] = null;
            const getChildren = (pid) => files.filter(f => f.parent === pid);
            const collectDeletes = (pid) => {
                getChildren(pid).forEach(c => {
                    updates['files/' + c.id] = null;
                    collectDeletes(c.id);
                });
            };
            collectDeletes(state.selectedId);
            update(ref(db), updates).then(() => showToast("Deleted"));
        };

        window.renameItem = function() {
            if(!state.selectedId) return;
            const file = files.find(f => f.id === state.selectedId);
            const newName = prompt("Rename:", file.name);
            if(newName) update(ref(db, 'files/' + state.selectedId), { name: newName });
        };

        window.clearSelection = function(e) {
            if(e.target.classList.contains('grid') || e.target.classList.contains('file-explorer')) {
                state.selectedId = null;
                document.querySelectorAll('.item').forEach(i => i.classList.remove('selected'));
                updateButtons();
            }
        };

        // ============================================================
        // MOVE FUNCTIONALITY
        // ============================================================
        window.openMoveModal = function() {
            if(!state.selectedId) return;
            const fileToMove = files.find(f => f.id === state.selectedId);
            const listContainer = document.getElementById('move-folder-list');
            listContainer.innerHTML = `<div class="folder-item active" onclick="selectMoveTarget(null, this)">🏠 Root (Home)</div>`;
            
            const isDescendant = (childId, parentId) => {
               if(!childId) return false;
               if(childId === parentId) return true;
               const child = files.find(f => f.id === childId);
               return child && child.parent ? isDescendant(child.parent, parentId) : false;
            };

            const allFolders = files.filter(f => f.type === 'folder' && f.id !== state.selectedId);
            allFolders.forEach(folder => {
                if(fileToMove.type === 'folder' && isDescendant(folder.id, fileToMove.id)) return;
                const el = document.createElement('div');
                el.className = 'folder-item';
                el.innerHTML = `📁 ${folder.name}`;
                el.onclick = () => window.selectMoveTarget(folder.id, el);
                listContainer.appendChild(el);
            });

            state.targetMoveFolder = null;
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        window.selectMoveTarget = function(id, el) {
            state.targetMoveFolder = id;
            document.querySelectorAll('.folder-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        };

        window.confirmMove = function() {
            if(state.selectedId) {
                update(ref(db, 'files/' + state.selectedId), { parent: state.targetMoveFolder })
                .then(() => showToast("Item Moved!"));
            }
            window.closeMoveModal();
        };

        window.closeMoveModal = () => document.getElementById('modal-overlay').style.display = 'none';

        // ============================================================
        // NOTE LOGIC
        // ============================================================
        window.openNote = function(id) {
            const file = files.find(f => f.id === id);
            if(!file) return;
            state.openNoteId = id;
            const editor = document.getElementById('note-editor');
            document.getElementById('note-filename').textContent = file.name;
            document.getElementById('notepad-overlay').classList.add('active');
            editor.innerHTML = file.content || "";

            // Restore remove-btn visibility logic for images
            editor.querySelectorAll('.img-remove-btn').forEach(btn => {
                if(state.role !== 'host') btn.style.display = 'none';
            });

            if(state.role === 'host') {
                editor.setAttribute('contenteditable', 'true');
                editor.focus();
            } else {
                editor.setAttribute('contenteditable', 'false');
                editor.querySelectorAll('pre').forEach(p => p.setAttribute('contenteditable', 'false'));
            }
        };

        window.saveNoteManual = () => saveNoteData(true);

        function saveNoteData(showNotif) {
            if(state.openNoteId && state.role === 'host') {
                update(ref(db, 'files/' + state.openNoteId), { 
                    content: document.getElementById('note-editor').innerHTML 
                }).then(() => {
                    if(showNotif) showToast("Saved!");
                });
            }
        }

        window.closeNote = function() {
            document.getElementById('notepad-overlay').classList.remove('active');
            state.openNoteId = null;
        };

        // ============================================================
        // AUTO SAVE
        // ============================================================
        const autoSaveCheckbox = document.getElementById('autosave-toggle');
        const editor = document.getElementById('note-editor');

        autoSaveCheckbox.addEventListener('change', (e) => {
            isAutoSaveOn = e.target.checked;
            showToast(isAutoSaveOn ? "Auto-Save ON" : "Auto-Save OFF");
        });

        editor.addEventListener('input', () => {
            if(state.role === 'host' && isAutoSaveOn) {
                clearTimeout(autoSaveTimer);
                autoSaveTimer = setTimeout(() => saveNoteData(false), 2000);
            }
        });

        // ============================================================
        // FORMATTING & SHORTCUTS
        // ============================================================
        window.formatDoc = function(cmd) {
            document.execCommand(cmd, false, null);
            editor.focus();
            checkToolbarStatus();
        };

        document.addEventListener('selectionchange', () => {
            if(state.openNoteId && state.role === 'host') checkToolbarStatus();
        });

        function checkToolbarStatus() {
            try {
                const bold = document.queryCommandState('bold');
                const italic = document.queryCommandState('italic');
                const underline = document.queryCommandState('underline');
                document.getElementById('tool-bold').classList.toggle('active-tool', bold);
                document.getElementById('tool-italic').classList.toggle('active-tool', italic);
                document.getElementById('tool-underline').classList.toggle('active-tool', underline);
            } catch(e) {}
        }

        editor.addEventListener('keydown', (e) => {
            if(e.ctrlKey) {
                const key = e.key.toLowerCase();
                if(key === 'b') { e.preventDefault(); window.formatDoc('bold'); }
                if(key === 'i') { e.preventDefault(); window.formatDoc('italic'); }
                if(key === 'u') { e.preventDefault(); window.formatDoc('underline'); }
            }
        });

        window.searchTextInEditor = function() {
            const txt = document.getElementById('editor-search-box').value;
            if(!txt) return;
            if (window.find && window.getSelection) {
                document.designMode = "on";
                const sel = window.getSelection();
                sel.collapse(document.body, 0);
                if(!window.find(txt)) showToast("Text not found");
                document.designMode = "off";
            }
        };

        // ============================================================
        // SEARCH MODE
        // ============================================================
        let searchMode = 'all'; // 'all' | 'current' | 'deep'

        window.setSearchMode = function(mode) {
            searchMode = mode;
            // Button active state update
            ['all','current','deep'].forEach(m => {
                const btn = document.getElementById('smode-' + m);
                if(btn) btn.classList.toggle('active-mode', m === mode);
            });
            // Re-run search if search box has text
            filterFiles();
        };

        // Deep search: current folder + all descendants (recursive)
        function getAllDescendantIds(folderId) {
            const ids = new Set();
            const queue = [folderId];
            while(queue.length) {
                const cur = queue.shift();
                ids.add(cur);
                files.filter(f => f.parent === cur).forEach(child => {
                    if(!ids.has(child.id)) queue.push(child.id);
                });
            }
            return ids;
        }

        // ============================================================
        // FILE SEARCH & RENDER
        // ============================================================
        window.filterFiles = function() {
            const term = document.getElementById('file-search').value.toLowerCase();
            const grid = document.getElementById('file-grid');
            grid.innerHTML = '';
            
            let list = [];
            
            if(term.length > 0) {
                // --- SEARCH MODE ACTIVE ---
                const breadcrumb = document.getElementById('breadcrumb-path');
                document.getElementById('btn-up').disabled = false;

                if(searchMode === 'all') {
                    // Mode 1: सभी files में से search
                    buildBreadcrumb(null);
                    breadcrumb.innerHTML = `<span style="color:#ffcc00; font-weight:bold; text-shadow: 0 0 8px #ffcc00;">🌐 All Files Search: "${term}"</span>`;
                    list = files.filter(f => f.name.toLowerCase().includes(term));

                } else if(searchMode === 'current') {
                    // Mode 2: सिर्फ current page की direct files में search
                    buildBreadcrumb(state.currentFolderId);
                    breadcrumb.innerHTML += `&nbsp;<span style="color:#cc88ff; font-weight:bold; text-shadow: 0 0 8px #cc88ff;">| 📂 Current Page: "${term}"</span>`;
                    list = files.filter(f => {
                        const inCurrentPage = (state.currentFolderId === null) ? !f.parent : f.parent === state.currentFolderId;
                        return inCurrentPage && f.name.toLowerCase().includes(term);
                    });

                } else if(searchMode === 'deep') {
                    // Mode 3: current page + सभी sub-folders (recursive) में search
                    buildBreadcrumb(state.currentFolderId);
                    breadcrumb.innerHTML += `&nbsp;<span style="color:#00ff41; font-weight:bold; text-shadow: 0 0 8px #00ff41;">| 🔎 Page+Sub: "${term}"</span>`;

                    let inScopeIds;
                    if(state.currentFolderId === null) {
                        inScopeIds = null;
                    } else {
                        inScopeIds = getAllDescendantIds(state.currentFolderId);
                    }

                    list = files.filter(f => {
                        const nameMatch = f.name.toLowerCase().includes(term);
                        if(!nameMatch) return false;
                        if(inScopeIds === null) return true;
                        return inScopeIds.has(f.parent) || inScopeIds.has(f.id);
                    });
                }

            } else {
                // --- NORMAL BROWSE MODE ---
                buildBreadcrumb(state.currentFolderId);
                document.getElementById('btn-up').disabled = !state.currentFolderId;
                list = files.filter(f => {
                    if(state.currentFolderId === null) return !f.parent;
                    return f.parent === state.currentFolderId;
                });
            }

            if(list.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; color:#00ff4155; letter-spacing:2px;">[ NO ITEMS FOUND ]</p>';
            }

            list.forEach((f, idx) => {
                const el = document.createElement('div');
                el.className = 'item';
                el.style.animationDelay = (idx * 0.04) + 's';
                el.innerHTML = `
                    <span class="item-icon">${f.type === 'folder' ? '📁' : '📝'}</span>
                    <span>${f.name.replace(/</g, "&lt;")}</span>
                `;
                el.onclick = (e) => { e.stopPropagation(); selectItem(f.id, el); };
                el.ondblclick = () => {
                    if(f.type === 'folder') {
                        state.currentFolderId = f.id;
                        document.getElementById('file-search').value = '';
                        renderFiles();
                    } else {
                        openNote(f.id);
                    }
                };
                grid.appendChild(el);
            });
        };

        function renderFiles() { window.filterFiles(); }
        
        function updateButtons() {
            if(state.role === 'host') {
                const on = !!state.selectedId;
                document.getElementById('btn-rename').disabled = !on;
                document.getElementById('btn-delete').disabled = !on;
                document.getElementById('btn-move').disabled = !on;
            }
        }

        // ============================================================
        // CODE BLOCK
        // ============================================================
        window.insertCodeBlock = function() {
            if(state.role !== 'host') return;
            const id = 'c' + Date.now();
            const wrapperId = 'cw' + Date.now();
            const html = `
                <div class="code-container" id="${wrapperId}" contenteditable="false">
                    <div class="code-header">
                        <span>Snippet</span>
                        <div>
                            <button class="code-copy-btn" onclick="copySnippet('${id}')">Copy</button>
                            <button class="code-delete-btn host-only-code-del" onclick="removeCodeBlock('${wrapperId}')" title="Delete Code Block">🗑 Delete</button>
                        </div>
                    </div>
                    <pre id="${id}" class="prettyprint" contenteditable="true"></pre>
                </div><p><br></p>`;
            document.execCommand('insertHTML', false, html);
        };

        window.copySnippet = function(id) {
            const el = document.getElementById(id);
            if(!el) return;
            const text = el.innerText;
            // Method 1: Modern Clipboard API
            if(navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast("✅ Code Copied!"))
                    .catch(() => _fallbackCopy(text));
            } else {
                _fallbackCopy(text);
            }
        };

        window.removeCodeBlock = function(wrapperId) {
            if(state.role !== 'host') return;
            const el = document.getElementById(wrapperId);
            if(el && confirm("Code block delete karein?")) {
                el.remove();
                saveNoteData(false);
                showToast("Code block removed");
            }
        };

        // ============================================================
        // UNIVERSAL COPY FALLBACK (textarea trick - works everywhere)
        // ============================================================
        function _fallbackCopy(text) {
            try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                ta.setSelectionRange(0, ta.value.length);
                const ok = document.execCommand('copy');
                document.body.removeChild(ta);
                showToast(ok ? "✅ Copied!" : "❌ Copy failed - please copy manually");
            } catch(e) {
                showToast("❌ Copy failed - please copy manually");
            }
        }

        // ============================================================
        // COPY ALL - पूरे HTML format के साथ
        // Paste करने पर किसी भी browser में format बना रहेगा
        // ============================================================
        window.copyFullFormatted = function() {
            const editorEl = document.getElementById('note-editor');
            const htmlContent = editorEl.innerHTML;
            const styledHtml = `<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { font-family: 'Segoe UI', sans-serif; font-size: 1.1rem; line-height: 1.6; padding: 20px; color: #222; max-width: 900px; margin: 0 auto; }
  b, strong { font-weight: bold; }
  i, em { font-style: italic; }
  u { text-decoration: underline; }
  ul { margin-left: 20px; }
  .code-container { margin: 15px 0; background: #282c34; border-radius: 6px; overflow: hidden; }
  .code-header { background: #21252b; color: #ccc; padding: 5px 15px; font-size: 0.85rem; display: flex; justify-content: space-between; }
  pre { padding: 15px; color: #abb2bf; font-family: 'Consolas', 'Courier New', monospace; white-space: pre-wrap; margin: 0; font-size: 0.95rem; }
  .note-image-wrapper { display: block; margin: 12px 0; }
  .note-image-wrapper img { max-width: 100%; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .img-caption { font-size: 0.85rem; color: #888; text-align: center; margin-top: 4px; }
  .img-remove-btn { display: none !important; }
  .code-copy-btn { display: none; }
</style>
</head><body>${htmlContent}</body></html>`;

            const plainText = editorEl.innerText;

            // Method 1: Modern ClipboardItem API (supports HTML format)
            if(navigator.clipboard && window.ClipboardItem) {
                try {
                    const htmlBlob = new Blob([styledHtml], { type: 'text/html' });
                    const textBlob = new Blob([plainText], { type: 'text/plain' });
                    const clipItem = new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob });
                    navigator.clipboard.write([clipItem])
                        .then(() => showToast("✅ Formatted Copy Done! (Paste anywhere with format)"))
                        .catch(() => {
                            // Method 2: Plain text via Clipboard API
                            navigator.clipboard.writeText(plainText)
                                .then(() => showToast("✅ Plain text copied!"))
                                .catch(() => _fallbackCopy(plainText));
                        });
                    return;
                } catch(e) { /* fall through */ }
            }

            // Method 3: execCommand fallback (plain text)
            _fallbackCopy(plainText);
        };

        // ============================================================
        // IMAGE URL INSERT
        // ============================================================
        let _savedSelection = null;

        window.openImgModal = function() {
            if(state.role !== 'host') return;
            // Cursor position save करो
            const sel = window.getSelection();
            if(sel && sel.rangeCount > 0) _savedSelection = sel.getRangeAt(0).cloneRange();

            document.getElementById('img-url-input').value = '';
            document.getElementById('img-url-preview').style.display = 'none';
            document.getElementById('img-url-error').style.display = 'none';
            document.getElementById('img-modal-overlay').classList.add('open');
        };

        window.closeImgModal = function() {
            document.getElementById('img-modal-overlay').classList.remove('open');
        };

        window.previewImgUrl = function() {
            const url = document.getElementById('img-url-input').value.trim();
            const preview = document.getElementById('img-url-preview');
            const errMsg = document.getElementById('img-url-error');
            if(!url) { preview.style.display = 'none'; errMsg.style.display = 'none'; return; }
            preview.src = url;
            preview.style.display = 'block';
            preview.onerror = () => {
                preview.style.display = 'none';
                errMsg.style.display = 'block';
            };
            preview.onload = () => { errMsg.style.display = 'none'; };
        };

        window.confirmInsertImage = function() {
            const url = document.getElementById('img-url-input').value.trim();
            if(!url) { showToast("URL डालें"); return; }

            closeImgModal();

            // Cursor restore
            if(_savedSelection) {
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(_savedSelection);
            }

            // Unique id for remove button
            const uid = 'img_' + Date.now();

            // Image block HTML - self contained, works on paste too
            const imgHtml = `<div class="note-image-wrapper" id="${uid}" contenteditable="false">
  <img src="${url}" alt="Image" onerror="this.parentElement.querySelector('.img-caption').textContent='⚠️ Image load नहीं हुई';" />
  <button class="img-remove-btn" onclick="removeNoteImage('${uid}')" title="Remove Image">✕</button>
  <div class="img-caption" contenteditable="true" style="outline:none;" placeholder="Caption (optional)..."></div>
</div><p><br></p>`;

            document.execCommand('insertHTML', false, imgHtml);
            editor.focus();
            showToast("🖼️ Image Added!");
        };

        window.removeNoteImage = function(uid) {
            const el = document.getElementById(uid);
            if(el && confirm("Image हटाएं?")) { el.remove(); saveNoteData(false); showToast("Image removed"); }
        };

        // ============================================================
        // UTILS
        // ============================================================
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.opacity = 1;
            t.style.animation = 'toastSlide 0.3s ease-out';
            setTimeout(() => { t.style.opacity = 0; t.style.animation = ''; }, 2500);
        }

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('login-id').value;
            const p = document.getElementById('login-pass').value;
            if(u === CREDENTIALS.id && p === CREDENTIALS.pass) {
                document.getElementById('login-screen').classList.add('hidden');
                startSession('host');
                showToast("Access Granted");
            } else {
                showToast("Invalid Credentials");
            }
        });
    </script>
</body>
</html>
